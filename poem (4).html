<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Tribute in Verse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #8a3a3a 0%, #6b2222 50%, #441515 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    padding: 2rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 0.75rem;
  }

  .ornament-line {
    width: 50px; height: 1px;
    background: #8b1a1a; opacity: 0.5;
  }

  .ornament-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #8b1a1a; opacity: 0.7;
  }

  .header h1 {
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #6b1010;
    opacity: 0.8;
  }

  .card {
    max-width: 520px;
    width: 100%;
    background: rgba(255,255,255,0.5);
    border: 0.5px solid rgba(139,26,26,0.25);
    border-radius: 16px;
    padding: 2.5rem 3rem;
    backdrop-filter: blur(6px);
    position: relative;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .stanza-label {
    position: absolute;
    top: -11px; left: 24px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #f5e3d8;
    background: #8a3a3a;
    padding: 2px 12px;
    border-radius: 20px;
    border: 0.5px solid rgba(139,26,26,0.25);
    text-transform: uppercase;
  }

  .stanza-text {
    line-height: 2.1;
    color: #3a0a0a;
  }

  .stanza-text span {
    display: block;
    font-size: 17px;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
  }

  .stanza-text span.indent {
    padding-left: 2rem;
    font-style: italic;
  }

  .stanza-text span.bold {
    font-weight: 700;
    font-size: 19px;
    color: #5a0a0a;
  }

  .stanza-text.center {
    text-align: center;
  }

  .progress {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin: 1.5rem 0;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(139,26,26,0.25);
    transition: background 0.3s;
  }

  .dot.active {
    background: #8b1a1a;
  }

  .btn-next {
    display: block;
    margin: 0 auto;
    padding: 0.65rem 2.5rem;
    background: transparent;
    border: 1px solid rgba(139,26,26,0.5);
    border-radius: 30px;
    color: #7a1515;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .btn-next:hover {
    background: rgba(139,26,26,0.1);
  }

  .btn-next:disabled {
    opacity: 0.35;
    cursor: default;
    background: transparent;
  }

  .heart {
    display: block;
    text-align: center;
    font-size: 18px;
    color: #8b1a1a;
    margin-top: 1.5rem;
    opacity: 0;
    transition: opacity 0.6s;
  }

  .heart.visible { opacity: 0.8; }

  .end-image {
    max-width: 520px;
    width: 100%;
    margin-top: 1.5rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s 0.3s, transform 0.6s 0.3s;
    display: none;
  }

  .end-image.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .end-image img {
    width: 100%;
    border-radius: 16px;
    border: 0.5px solid rgba(139,26,26,0.25);
    display: block;
  }

  /* placeholder upload zone shown before image is picked */
  .upload-zone {
    width: 100%;
    border-radius: 16px;
    border: 1.5px dashed rgba(139,26,26,0.4);
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    display: none;
  }

  .upload-zone:hover { background: rgba(139,26,26,0.05); }

  .upload-zone p {
    font-size: 13px;
    color: #7a1515;
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
    opacity: 0.7;
  }

  .upload-zone .upload-icon {
    font-size: 28px;
    color: #8b1a1a;
    opacity: 0.5;
  }

  #file-input { display: none; }

  .stanza-text {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s, transform 0.5s;
  }

  .stanza-text.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>

<div class="header">
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
  </div>
  <h1>A Tribute in Verse</h1>
</div>

<div class="card">

</div>

<button class="btn-next" id="btn">Next →</button>

<span class="heart" id="heart">♥</span>

<div class="end-image" id="end-image">

<script>
  const stanzas = [
    {
      label: "I",
      lines: [
        { text: "From bare bones of struggle", cls: "" },
        { text: "Marching like a soldier on his last stand", cls: "" },
        { text: "Ignoring his personal desires", cls: "" },
        { text: "To ensure others aspire", cls: "indent" }
      ],
      center: false
    },
    {
      label: "II",
      lines: [
        { text: "To an icon for his peers", cls: "" },
        { text: "To a goal for aides", cls: "" },
        { text: "To a pillar for his kin", cls: "" }
      ],
      center: false
    },
    {
      label: "III",
      lines: [
        { text: "All his tasks a win", cls: "" },
        { text: "From birth never a sin", cls: "" }
      ],
      center: false
    },
    {
      label: "IV",
      lines: [
        { text: "And for me —", cls: "" },
        { text: "I am proud to have him as a kin", cls: "bold" }
      ],
      center: true
    }
  ];

  let current = 0;

  const labelEl = document.getElementById('label');
  const textEl = document.getElementById('stanza-text');
  const btn = document.getElementById('btn');
  const progressEl = document.getElementById('progress');
  const heart = document.getElementById('heart');
  const endImage = document.getElementById('end-image');
  const fileInput = document.getElementById('file-input');
  const preview = document.getElementById('preview');
  const uploadZone = document.getElementById('upload-zone');

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    preview.src = url;
    preview.style.display = 'block';
    uploadZone.style.display = 'none';
  });

  stanzas.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    progressEl.appendChild(d);
  });

  function render(idx) {
    const s = stanzas[idx];
    labelEl.textContent = s.label;

    textEl.classList.remove('show', 'center');
    textEl.innerHTML = '';

    if (s.center) textEl.classList.add('center');

    s.lines.forEach(l => {
      const span = document.createElement('span');
      span.textContent = l.text;
      if (l.cls) span.className = l.cls;
      textEl.appendChild(span);
    });

    requestAnimationFrame(() => {
      requestAnimationFrame(() => textEl.classList.add('show'));
    });

    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });

    if (idx === stanzas.length - 1) {
      btn.textContent = '— The End —';
      btn.disabled = true;
      heart.classList.add('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => endImage.classList.add('visible')));
    } else {
      btn.textContent = 'Next →';
      btn.disabled = false;
    }
  }

  render(0);

  btn.addEventListener('click', () => {
    if (current < stanzas.length - 1) {
      current++;
      render(current);
    }
  });
</script>
</body>
</html>
